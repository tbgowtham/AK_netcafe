[build]
  command = "npm run install-all && npm run build --prefix frontend"
  publish = "frontend/dist"

[functions]
  directory = "backend/src"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/serverless"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
